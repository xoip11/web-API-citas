<mat-card>
<h2>gestion de citas</h2>
<div class="form">
  <mat-form-field appearance="outline">
    <mat-label>Id cita</mat-label>
   <input matInput [value]="newAppointment.idCita" disabled>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Id usuario</mat-label>
    <input matInput  type="number"  [(ngModel)]="newAppointment.idUsuarioEstudiante">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Id especialista</mat-label>
    <input matInput  type="number"  [(ngModel)]="newAppointment.idEspecialista">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Fecha</mat-label>
    <input matInput [(ngModel)]="newAppointment.fecha">
  </mat-form-field>

   <mat-form-field appearance="outline">
    <mat-label>Hora</mat-label>
    <input matInput [(ngModel)]="newAppointment.hora">
  </mat-form-field>

   <mat-form-field appearance="outline">
    <mat-label>Descripcion</mat-label>
    <textarea matInput rows="1" [(ngModel)]="newAppointment.descripcion"></textarea>
  </mat-form-field>

   

  <button mat-raised-button color="primary" (click)="saveAppointment()">
    Guardar
  </button>
</div>
</mat-card>

<mat-card>
  <table mat-table [dataSource]="Appointment" class="mat-elevation-z8">
    <ng-container matColumnDef="idCita">
      <th mat-header-cell *matHeaderCellDef> Id cita</th>
      <td mat-cell *matCellDef="let p">{{p.idCita}} </td>
    </ng-container>

    
    <ng-container matColumnDef="idUsuarioEstudiante">
      <th mat-header-cell *matHeaderCellDef> Id Usuario</th>
      <td mat-cell *matCellDef="let p">{{p.idUsuarioEstudiante}} </td>
    </ng-container>

    <ng-container matColumnDef="idEspecialista">
      <th mat-header-cell *matHeaderCellDef> Id Especialista</th>
      <td mat-cell *matCellDef="let p">{{p.idEspecialista}} </td>
    </ng-container>

    <ng-container matColumnDef="fecha">
      <th mat-header-cell *matHeaderCellDef> fecha</th>
      <td mat-cell *matCellDef="let p">{{p.fecha}} </td>
    </ng-container>

    <ng-container matColumnDef="hora">
      <th mat-header-cell *matHeaderCellDef> hora</th>
      <td mat-cell *matCellDef="let p">{{p.hora}} </td>
    </ng-container>

    <ng-container matColumnDef="descripcion"> 
     <th mat-header-cell *matHeaderCellDef> Descripción </th>
     <td mat-cell *matCellDef="let p"> {{ p.descripcion}} </td>
    </ng-container>

    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef> estado</th>
      <td mat-cell *matCellDef="let p">{{p.estado}} </td>
    </ng-container> 

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let p">
        <button mat-button color="green" (click)="DeleteApointment(p.idCita)">  
          Cancelar
        </button>
      <button mat-button color="green" (click)="confirmarAppointment(p.idCita)">  
          confirmar
        </button>
       <button mat-button (click)="EditarAppointment(p)">Editar</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>
</mat-card>
