<mat-card>
  <h2>Nueva Cita</h2>

  <mat-form-field>
    <input matInput placeholder="Id Usuario" [(ngModel)]="newAppointment.idUsuarioEstudiante">
  </mat-form-field>

  <mat-form-field>
    <input matInput placeholder="Id Especialista" [(ngModel)]="newAppointment.idEspecialista">
  </mat-form-field>

  <mat-form-field>
    <input matInput placeholder="Fecha" [(ngModel)]="newAppointment.fecha">
  </mat-form-field>

  <mat-form-field>
    <input matInput placeholder="Hora" [(ngModel)]="newAppointment.hora">
  </mat-form-field>

  <mat-form-field>
    <input matInput placeholder="Descripción" [(ngModel)]="newAppointment.descripcion">
  </mat-form-field>

  <button mat-raised-button color="primary"
  (click)="saveAppointment()"
  [disabled]="!newAppointment.descripcion || !newAppointment.fecha">
  Guardar
</button>
</mat-card>
