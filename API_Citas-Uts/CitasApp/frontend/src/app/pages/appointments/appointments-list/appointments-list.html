<table mat-table [dataSource]="appointments">

  <ng-container matColumnDef="idCita">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let e">{{e.idCita}}</td>
  </ng-container>

  <ng-container matColumnDef="idUsuarioEstudiante">
    <th mat-header-cell *matHeaderCellDef>Usuario</th>
    <td mat-cell *matCellDef="let e">{{e.idUsuarioEstudiante}}</td>
  </ng-container>

  <ng-container matColumnDef="idEspecialista">
    <th mat-header-cell *matHeaderCellDef>Especialista</th>
    <td mat-cell *matCellDef="let e">{{e.idEspecialista}}</td>
  </ng-container>

  <ng-container matColumnDef="fecha">
    <th mat-header-cell *matHeaderCellDef>Fecha</th>
    <td mat-cell *matCellDef="let e">{{e.fecha}}</td>
  </ng-container>

  <ng-container matColumnDef="hora">
    <th mat-header-cell *matHeaderCellDef>Hora</th>
    <td mat-cell *matCellDef="let e">{{e.hora}}</td>
  </ng-container>
  
  <ng-container matColumnDef="descripcion">
  <th mat-header-cell *matHeaderCellDef>Descripción</th>
  <td mat-cell *matCellDef="let e">{{e.descripcion}}</td>
</ng-container>

  <ng-container matColumnDef="estado">
    <th mat-header-cell *matHeaderCellDef>Estado</th>
    <td mat-cell *matCellDef="let e">{{e.estado}}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Acciones</th>
    <td mat-cell *matCellDef="let e">
      <button mat-button (click)="deleteAppointment(e.idCita)">Eliminar</button>
      <button mat-button (click)="confirmAppointment(e.idCita)">Confirmar</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
